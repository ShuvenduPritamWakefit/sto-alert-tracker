name: STO Alert Tracker (Daily)

on:
  schedule:
    - cron: "0 4 * * *"   # 09:30 IST (04:00 UTC)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

concurrency:
  group: sto-alert-tracker
  cancel-in-progress: false

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Register Jupyter kernel
        run: python -m ipykernel install --user --name python3

      - name: Execute notebook with papermill
        run: |
          papermill \
            sto_alert_tracker_shuvendu.ipynb \
            executed_notebook.ipynb \
            --kernel python3 \
            --log-output

      - name: Upload executed notebook (debugging artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook-${{ github.run_id }}
          path: executed_notebook.ipynb
          retention-days: 7
